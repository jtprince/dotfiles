# `sheldon` configuration file
# ----------------------------
#
# You can modify this file directly or you can use one of the following
# `sheldon` commands which are provided to assist in editing the config file:
#
# - `sheldon add` to add a new plugin to the config file
# - `sheldon edit` to open up the config file in the default editor
# - `sheldon remove` to remove a plugin from the config file
#
# See the documentation for more https://github.com/rossmacarthur/sheldon#readme

# For example:
#
# [plugins.base16]
# github = "chriskempson/base16-shell"

shell = "zsh"

[plugins]

######################################
# PERSONAL
######################################
# Write them out to easily turn on/off

[plugins.__init_completion]
inline = '''
# Custom completion scripts ahead of defaults.
fpath=("$HOME/.config/zsh/completion" $fpath)

# zsh native completion — fast-path compinit.
# Skip security check (-C) and reuse the dump unless older than 24h.
autoload -Uz compinit
_zcompdump="${ZDOTDIR:-$HOME}/.zcompdump"
if [[ -n $_zcompdump(#qNmh-24) ]]; then
  compinit -C -i -d $_zcompdump
else
  compinit -i -d $_zcompdump
fi
# Byte-compile the dump for faster loads next shell.
if [[ -s $_zcompdump && ( ! -s $_zcompdump.zwc || $_zcompdump -nt $_zcompdump.zwc ) ]]; then
  zcompile $_zcompdump
fi
unset _zcompdump

# Bash-completion bridge (argcomplete uses it).
autoload -U bashcompinit
bashcompinit

# register-python-argcomplete cheat — cache the eval (python subprocess is slow).
_cheat_cache="${HOME}/.cache/cheat-argcomplete.zsh"
if command -v register-python-argcomplete >/dev/null 2>&1 && command -v cheat >/dev/null 2>&1; then
  if [[ ! -s $_cheat_cache || $(command -v cheat) -nt $_cheat_cache ]]; then
    mkdir -p ${_cheat_cache:h}
    register-python-argcomplete cheat > $_cheat_cache 2>/dev/null
  fi
  source $_cheat_cache
fi
unset _cheat_cache
'''

[plugins.cmd_exists]
local = "~/.config/zsh/plugins"
use = [ "_cmd_exists.zsh" ]

